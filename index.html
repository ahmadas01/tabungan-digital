<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Tabungan Digital Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3182ce">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #3182ce; --primary-hover: #2b6cb0; --success: #38a169; --danger: #e53e3e; --warning: #d69e2e; --excel: #107c41; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        
        /* Layout */
        #authSection { max-width: 400px; margin: 80px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); text-align: center; }
        #appSection { display: none; max-width: 1000px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        
        h1 { color: var(--dark); margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .header-app { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 10px; }
        .header-app h1 { border: none; margin: 0; padding: 0; }
        .user-info { font-size: 0.9em; color: #718096; display: flex; align-items: center; gap: 15px; }
        
        /* Dashboard */
        .dashboard-top { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .balance-card { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .balance-card h3 { margin: 0 0 10px 0; font-weight: 400; font-size: 1.1em; opacity: 0.9; }
        .balance-card h2 { margin: 0 0 20px 0; font-size: 2.5em; letter-spacing: 1px; word-break: break-all; }
        .chart-card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; justify-content: center; align-items: center; height: 220px; }
        
        /* Target Progress */
        .target-section { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; }
        .target-header { display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 8px; }
        .target-btn { background: none; border: 1px solid rgba(255,255,255,0.5); color: #fff; cursor: pointer; border-radius: 4px; padding: 2px 8px; font-size: 0.8em; }
        .progress-bg { background: rgba(255,255,255,0.2); height: 10px; border-radius: 10px; overflow: hidden; }
        .progress-fill { background: #48bb78; height: 100%; width: 0%; transition: width 0.5s; }
        
        /* Forms */
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; text-align: left; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .form-group.full-width { grid-column: span 3; }
        label { margin-bottom: 6px; font-weight: 600; color: #4a5568; font-size: 0.85em; text-transform: uppercase; }
        input, select { padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        /* Buttons */
        .btn { border: none; padding: 12px 15px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; color: white; width: 100%; transition: 0.3s; display: flex; justify-content: center; align-items: center; text-align: center;}
        .btn-primary { background: var(--primary); }
        .btn-primary.edit-mode { background: var(--warning); color: #000; }
        .btn-danger { background: var(--danger); }
        .btn-excel { background: var(--excel); }
        .btn-excel:hover { background: #0e6133; }
        .btn-cancel { background: #a0aec0; display: none; }
        .btn-sm { padding: 6px 10px; font-size: 12px; width: auto; margin-right: 5px; }
        .btn-edit-sm { background: var(--warning); color: #000; }
        
        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap;}
        .btn-submit { flex: 2; min-width: 200px; }
        
        .toggle-auth { color: var(--primary); cursor: pointer; font-size: 0.9em; margin-top: 15px; display: inline-block; }

        /* Table */
        .filter-section { display: flex; justify-content: space-between; align-items: center; background: #f7fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;}
        .filter-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; width: 100%; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 600px; } /* Min width agar tabel bisa di-scroll di HP */
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #edf2f7; color: #4a5568; font-weight: 600; text-transform: uppercase; font-size: 0.8em; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; white-space: nowrap; }
        .badge-in { background-color: #def7ec; color: #03543f; }
        .badge-out { background-color: #fde8e8; color: #9b1c1c; }
        .text-green { color: var(--success); font-weight: bold; white-space: nowrap; }
        .text-red { color: var(--danger); font-weight: bold; white-space: nowrap; }
        .action-td { white-space: nowrap; }

        /* ====================================================
           KODE RESPONSIVE UNTUK LAYAR HP (MOBILE FRIENDLY)
           ==================================================== */
        @media (max-width: 768px) {
            body { padding: 10px; }
            #appSection, #authSection { padding: 15px; }
            
            /* Header jadi susun ke bawah */
            .header-app { flex-direction: column; gap: 15px; text-align: center; }
            .user-info { justify-content: center; width: 100%; }
            
            /* Kartu Saldo & Grafik jadi 1 kolom (atas-bawah) */
            .dashboard-top { grid-template-columns: 1fr; }
            .balance-card h2 { font-size: 2em; }
            
            /* Form Input jadi 1 baris ke bawah */
            .form-grid { display: flex; flex-direction: column; gap: 10px; }
            .form-group { margin-bottom: 5px; }
            
            /* Tombol-tombol aksi penuhi layar HP */
            .action-buttons { flex-direction: column; }
            .action-buttons .btn { width: 100%; margin-bottom: 5px; }
            
            /* Bagian Filter tabel menyesuaikan layar */
            .filter-section { flex-direction: column; align-items: stretch; }
            .filter-controls { flex-direction: column; align-items: stretch; width: 100%; }
            .filter-controls > * { width: 100%; margin-bottom: 5px; }
            .divider { display: none; } /* Sembunyikan garis pemisah di HP */
        }
    </style>
</head>
<body>

<div id="authSection">
    <h2 id="authTitle">Masuk ke Akun</h2>
    <form id="authForm">
        <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
        <button type="submit" class="btn btn-primary" id="authBtn">Masuk</button>
    </form>
    <span class="toggle-auth" onclick="toggleAuthMode()" id="authToggleText">Belum punya akun? Daftar di sini</span>
</div>

<div id="appSection">
    <div class="header-app">
        <h1>Buku Tabungan Digital</h1>
        <div class="user-info no-print">
            <span id="userEmailDisplay">user@email.com</span>
            <button class="btn btn-danger btn-sm" onclick="logoutUser()">Logout</button>
        </div>
    </div>

    <div class="dashboard-top">
        <div class="balance-card">
            <h3>Total Saldo Tersedia</h3>
            <h2 id="totalBalance">Rp 0</h2>
            <div class="target-section">
                <div class="target-header">
                    <span>Target: <strong id="targetText">Rp 0</strong></span>
                    <button class="target-btn no-print" onclick="setTarget()">Set Target</button>
                </div>
                <div class="progress-bg"><div class="progress-fill" id="progressBar"></div></div>
                <div style="text-align: right; font-size: 0.8em; margin-top: 5px;" id="progressText">0%</div>
            </div>
        </div>
        <div class="chart-card"><canvas id="cashflowChart"></canvas></div>
    </div>

    <form id="transactionForm" class="no-print">
        <input type="hidden" id="editId">
        <div class="form-grid">
            <div class="form-group"><label>Tanggal</label><input type="date" id="date" required></div>
            <div class="form-group">
                <label>Jenis</label>
                <select id="type" required><option value="in">Pemasukan (+)</option><option value="out">Pengeluaran (-)</option></select>
            </div>
            <div class="form-group"><label>Kategori</label><select id="category" required></select></div>
            <div class="form-group full-width"><label>Keterangan</label><input type="text" id="description" required></div>
            <div class="form-group full-width"><label>Nominal (Rp)</label><input type="number" id="amount" min="1" required></div>
        </div>
        <div class="action-buttons">
            <button type="submit" class="btn btn-primary btn-submit" id="submitBtn">Simpan Transaksi</button>
            <button type="button" class="btn btn-cancel" id="cancelBtn" onclick="cancelEdit()" style="flex: 1;">Batal Edit</button>
        </div>
    </form>

    <div id="printArea" style="margin-top: 30px;">
        <div class="filter-section no-print">
            <h3 style="margin: 0; margin-bottom: 10px;">Riwayat Transaksi</h3>
            <div class="filter-controls">
                <input type="month" id="monthFilter" style="width: auto; margin-bottom: 0;">
                <button class="btn btn-primary btn-sm" onclick="resetFilter()" style="padding: 10px;">Semua</button>
                <div class="divider" style="border-left: 2px solid #e2e8f0; height: 30px; margin: 0 5px;"></div>
                <button type="button" class="btn btn-danger btn-sm" onclick="exportPDF()" style="padding: 10px;">📄 Unduh PDF</button>
                <button type="button" class="btn btn-excel btn-sm" onclick="exportExcel()" style="padding: 10px;">📊 Unduh Excel</button>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>Tanggal</th><th>Kategori</th><th>Keterangan</th><th>Status</th><th>Nominal</th><th class="no-print">Aksi</th></tr></thead>
                <tbody id="transactionTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBZ1jbXJhhkW9PZhf67TDFV3e3X5XVEDU8", 
        authDomain: "tabunganapp-de8fd.firebaseapp.com",
        databaseURL: "https://tabunganapp-de8fd-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "tabunganapp-de8fd",
        storageBucket: "tabunganapp-de8fd.firebasestorage.app",
        messagingSenderId: "981044233075",
        appId: "1:981044233075:web:477759845bd06a2520bb06"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUserUid = null;
    let allTransactions = [];
    let savingsTarget = 0;
    let isLoginMode = true;

    // --- AUTHENTICATION ---
    window.toggleAuthMode = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').innerText = isLoginMode ? "Masuk ke Akun" : "Daftar Akun Baru";
        document.getElementById('authBtn').innerText = isLoginMode ? "Masuk" : "Daftar";
        document.getElementById('authToggleText').innerText = isLoginMode ? "Belum punya akun? Daftar di sini" : "Sudah punya akun? Masuk di sini";
    };

    document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('authBtn');
        btn.disabled = true; btn.innerText = "Memproses...";
        try {
            isLoginMode ? await signInWithEmailAndPassword(auth, email, password) : await createUserWithEmailAndPassword(auth, email, password);
        } catch (error) { alert("Error: " + error.message); } 
        finally { btn.disabled = false; btn.innerText = isLoginMode ? "Masuk" : "Daftar"; }
    });

    window.logoutUser = async () => { if(confirm('Yakin ingin keluar dari akun?')) await signOut(auth); };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserUid = user.uid;
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
            document.getElementById('userEmailDisplay').innerText = user.email;
            loadUserData();
        } else {
            currentUserUid = null;
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('appSection').style.display = 'none';
        }
    });

    // --- APLIKASI UTAMA ---
    const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);

    const typeSelect = document.getElementById('type');
    const categorySelect = document.getElementById('category');
    window.updateCategories = () => {
        categorySelect.innerHTML = typeSelect.value === 'in' ? 
            `<option value="Gaji">Gaji</option><option value="Bonus">Bonus</option><option value="Usaha">Hasil Usaha</option><option value="Lainnya">Lainnya</option>` : 
            `<option value="Konsumsi">Konsumsi</option><option value="Transportasi">Transportasi</option><option value="Tagihan">Tagihan</option><option value="Peralatan IT">Peralatan IT</option><option value="Lainnya">Lainnya</option>`;
    };
    typeSelect.addEventListener('change', updateCategories);
    updateCategories();

    const ctx = document.getElementById('cashflowChart').getContext('2d');
    let myChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: ['Pemasukan', 'Pengeluaran'], datasets: [{ data: [0, 0], backgroundColor: ['#38a169', '#e53e3e'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false }
    });

    const loadUserData = () => {
        onValue(ref(db, `users/${currentUserUid}/settings/target`), (snap) => {
            savingsTarget = snap.val() || 0;
            document.getElementById('targetText').innerText = savingsTarget > 0 ? formatRupiah(savingsTarget) : 'Belum diatur';
            renderUI();
        });
        onValue(ref(db, `users/${currentUserUid}/transactions`), (snap) => {
            const data = snap.val();
            allTransactions = data ? Object.keys(data).map(k => ({ id: k, ...data[k] })).sort((a,b) => new Date(b.date) - new Date(a.date)) : [];
            renderUI();
        });
    };

    const renderUI = () => {
        const tBody = document.getElementById('transactionTableBody');
        const mFilter = document.getElementById('monthFilter').value;
        tBody.innerHTML = ''; let bal = 0, tIn = 0, tOut = 0;

        allTransactions.forEach(t => t.type === 'in' ? bal += t.amount : bal -= t.amount);
        let filtered = mFilter ? allTransactions.filter(t => t.date.startsWith(mFilter)) : allTransactions;

        if (!filtered.length) {
            tBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 30px;">Tidak ada data pada periode ini.</td></tr>';
            myChart.data.datasets[0].data = [0, 0];
        } else {
            filtered.forEach(t => {
                t.type === 'in' ? tIn += t.amount : tOut += t.amount;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${t.date}</td>
                    <td><span class="badge" style="background:#ebf4ff; color:#2b6cb0;">${t.category}</span></td>
                    <td>${t.description}</td>
                    <td><span class="badge ${t.type === 'in' ? 'badge-in' : 'badge-out'}">${t.type === 'in' ? 'Masuk' : 'Keluar'}</span></td>
                    <td class="${t.type === 'in' ? 'text-green' : 'text-red'}">${t.type === 'in' ? '+' : '-'} ${formatRupiah(t.amount)}</td>
                    <td class="action-td no-print">
                        <button class="btn-sm btn-edit-sm" onclick="siapkanEdit('${t.id}')">Edit</button>
                        <button class="btn-sm btn-danger" onclick="hapusData('${t.id}')">Hapus</button>
                    </td>`;
                tBody.appendChild(tr);
            });
            myChart.data.datasets[0].data = [tIn, tOut];
        }
        document.getElementById('totalBalance').innerText = formatRupiah(bal);
        myChart.update();

        if (savingsTarget > 0) {
            let pct = Math.min(Math.max((bal / savingsTarget) * 100, 0), 100);
            document.getElementById('progressBar').style.width = `${pct}%`;
            document.getElementById('progressText').innerText = `${pct.toFixed(1)}% Tercapai`;
        }
    };

    // --- FITUR FORM (TAMBAH & EDIT) ---
    document.getElementById('transactionForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const editId = document.getElementById('editId').value;
        btn.disabled = true; btn.innerText = 'Menyimpan...';
        
        const dataBaru = {
            date: document.getElementById('date').value, type: document.getElementById('type').value,
            category: document.getElementById('category').value, description: document.getElementById('description').value,
            amount: parseFloat(document.getElementById('amount').value), createdAt: Date.now()
        };

        try {
            if (editId) {
                await update(ref(db, `users/${currentUserUid}/transactions/${editId}`), dataBaru);
                window.cancelEdit();
            } else {
                await push(ref(db, `users/${currentUserUid}/transactions`), dataBaru);
                this.reset(); updateCategories();
            }
        } catch (err) { alert("Gagal menyimpan data: " + err.message); } 
        finally { if(!editId) { btn.disabled = false; btn.innerText = 'Simpan Transaksi'; } }
    });

    window.siapkanEdit = (id) => {
        const trx = allTransactions.find(t => t.id === id);
        if(!trx) return;
        document.getElementById('editId').value = trx.id;
        document.getElementById('date').value = trx.date;
        document.getElementById('type').value = trx.type;
        window.updateCategories();
        document.getElementById('category').value = trx.category;
        document.getElementById('description').value = trx.description;
        document.getElementById('amount').value = trx.amount;

        const btn = document.getElementById('submitBtn');
        btn.innerText = 'Update Transaksi'; btn.classList.add('edit-mode');
        document.getElementById('cancelBtn').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.cancelEdit = () => {
        document.getElementById('transactionForm').reset();
        document.getElementById('editId').value = '';
        window.updateCategories();
        const btn = document.getElementById('submitBtn');
        btn.innerText = 'Simpan Transaksi'; btn.classList.remove('edit-mode'); btn.disabled = false;
        document.getElementById('cancelBtn').style.display = 'none';
    };

    window.hapusData = async (id) => { if(confirm('Yakin ingin menghapus catatan ini?')) await remove(ref(db, `users/${currentUserUid}/transactions/${id}`)); };
    
    window.setTarget = async () => {
        const val = prompt("Masukkan target tabungan Anda (contoh: 5000000):", savingsTarget || "");
        if (val && !isNaN(val)) await set(ref(db, `users/${currentUserUid}/settings/target`), parseFloat(val));
    };

    document.getElementById('monthFilter').addEventListener('change', renderUI);
    window.resetFilter = () => { document.getElementById('monthFilter').value = ''; renderUI(); };

    // --- FITUR EKSPOR PDF ---
    window.exportPDF = () => {
        window.scrollTo(0, 0); 
        const style = document.createElement('style'); 
        style.innerHTML = '@media print { .no-print { display: none !important; } }'; 
        document.head.appendChild(style);

        const element = document.getElementById('printArea');
        const opt = {
            margin:       0.3,
            filename:     'Laporan_Tabungan.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, scrollY: 0 },
            jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    };

    // --- FITUR EKSPOR EXCEL ---
    window.exportExcel = () => {
        const monthFilter = document.getElementById('monthFilter').value;
        let filtered = monthFilter ? allTransactions.filter(t => t.date.startsWith(monthFilter)) : allTransactions;

        if (filtered.length === 0) {
            alert("Tidak ada data untuk diekspor ke Excel pada periode ini.");
            return;
        }

        const dataToExport = filtered.map((t, index) => ({
            "No": index + 1,
            "Tanggal": t.date,
            "Kategori": t.category,
            "Keterangan": t.description,
            "Jenis": t.type === 'in' ? 'Pemasukan' : 'Pengeluaran',
            "Nominal (Rp)": t.amount
        }));

        const worksheet = XLSX.utils.json_to_sheet(dataToExport);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan Tabungan");
        XLSX.writeFile(workbook, "Laporan_Tabungan.xlsx");
    };

    // --- PWA Service Worker ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Gagal', err));
        });
    }
</script>
</body>
</html>
